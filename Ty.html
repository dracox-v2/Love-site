<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You Miss poop</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  overflow:hidden;
  font-family:Arial, sans-serif;
  background:black;
}

/* MAIN */

#main{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;

  background:
  radial-gradient(circle, #3d1026, #090309);

  opacity:0;

  transition:2s ease;

  z-index:1;
}

/* ETOILES */

.stars{
  position:absolute;
  width:100%;
  height:100%;
  overflow:hidden;
  pointer-events:none;
  z-index:2;
}

.star{
  position:absolute;

  width:2px;
  height:2px;

  border-radius:50%;

  background:#ffffff;

  opacity:0.7;

  box-shadow:
    0 0 4px #ffffff,
    0 0 8px #ffffff,
    0 0 14px #ffe9fb;

  animation:
    twinkle ease-in-out infinite;
}

@keyframes twinkle{

  0%,100%{
    opacity:0.2;
    transform:scale(0.8);
  }

  50%{
    opacity:1;
    transform:scale(1.4);
  }
}

/* INTRO */

#intro{
  position:absolute;
  width:100%;
  height:100%;

  display:flex;
  justify-content:center;
  align-items:center;

  background:
  radial-gradient(circle, #3d3a3d, #171316);

  z-index:10;

  transition:1.5s ease;

  cursor:pointer;
}

.terminal-box{
  color:white;
  font-family:'Courier New', monospace;
  text-align:left;
}

.system{
  color:#ff4fd8;
  font-size:15px;
  text-shadow:0 0 10px #ff4fd8;
  margin-bottom:25px;
}

.message{
  color:white;
  font-size:16px;
  font-style:italic;
  margin-bottom:25px;
}

/* BUTTON */

button{

  padding:14px 35px;

  border:none;

  background:#ff3f7f;

  color:white;

  font-weight:bold;

  font-family:'Courier New', monospace;

  cursor:pointer;

  box-shadow:
  0 0 10px #ff3f7f,
  0 0 25px #ff3f7f;

  transition:0.3s;
}

button:hover{

  transform:scale(1.05);

  background:#ff5c9a;
}

.hint{

  color:#b9aeb5;

  font-size:11px;

  margin-top:18px;
}

/* HEART */

.heart{
  position:relative;
  width:820px;
  height:820px;
  z-index:3;
}

/* WORDS */

.word{
  position:absolute;
  opacity:0;

  animation:
  arrive 5.5s cubic-bezier(.22,1,.36,1) forwards;

  animation-play-state:paused;

  will-change:transform, opacity;
}

.word span{

  display:inline-block;

  color:#ff4fd8;

  white-space:nowrap;

  text-shadow:
  0 0 4px #ff4fd8,
  0 0 8px #ff4fd8,
  0 0 16px #ff1ac6,
  0 0 22px #ff66e5;

  animation:
  floatLove 7s ease-in-out infinite,
  fadeLove 5s ease-in-out infinite;
}

/* ARRIVAL */

@keyframes arrive{

  0%{

    opacity:0;

    transform:
    translate(var(--startX), var(--startY))
    scale(0.1);

    filter:blur(3px);
  }

  100%{

    opacity:1;

    transform:
    translate(0,0)
    scale(1);

    filter:blur(0);
  }
}

/* FLOAT */

@keyframes floatLove{

  0%,100%{
    transform:translate(0,0) rotate(0deg);
  }

  25%{
    transform:
    translate(var(--moveX1), var(--moveY1))
    rotate(1deg);
  }

  50%{
    transform:
    translate(var(--moveX2), var(--moveY2))
    rotate(-1deg);
  }

  75%{
    transform:
    translate(var(--moveX3), var(--moveY3))
    rotate(1deg);
  }
}

/* TRANSPARENCY */

@keyframes fadeLove{

  0%,100%{
    opacity:0.35;
  }

  50%{
    opacity:1;
  }
}

/* GIFT CODE */

.gift-code{

  position:absolute;

  bottom:45px;

  text-align:center;

  color:white;

  font-family:'Courier New', monospace;

  opacity:0;

  transition:2s ease;

  z-index:3;
}

.gift-code p{

  color:white;

  font-size:26px;

  font-weight:bold;

  letter-spacing:2px;

  margin-bottom:14px;

  text-shadow:
    0 0 6px #ffffff,
    0 0 12px #ffffff,
    0 0 24px #ffb3ef,
    0 0 40px #ff4fd8;
}

.code{

  color:white;

  font-size:22px;

  text-shadow:
    0 0 6px #ffffff,
    0 0 12px #ffffff,
    0 0 24px #ffffff,
    0 0 40px #ffd9fb;

  margin-bottom:14px;
}

.copy-btn{
  padding:10px 25px;
  font-size:13px;
}

.roblox-label{

  margin-top:10px;

  font-size:12px;

  color:#ffd9f6;

  opacity:0.7;

  font-style:italic;

  text-shadow:
  0 0 8px #ff9be8;
}

</style>
</head>

<body>

<!-- MUSIQUE -->

<audio id="bgMusic" loop>
  <source src="Zic.mp3" type="audio/mpeg">
</audio>

<!-- INTRO -->

<div id="intro" onclick="openHeart()">

  <div class="terminal-box">

    <p class="system">
      [system] loading...
    </p>

    <p class="message">
      &gt; One encrypted package found for princesses.
    </p>

    <button onclick="openHeart()">
      🔓 DECRYPT MESSAGE
    </button>

    <p class="hint">
      METS DU SONNNN
    </p>

  </div>

</div>

<!-- MAIN -->

<div id="main">

  <!-- ETOILES -->

  <div class="stars" id="stars"></div>

  <!-- HEART -->

  <div class="heart" id="heart"></div>

  <!-- GIFT -->

  <div class="gift-code" id="giftCode">

    <p>P'tit Gourmand</p>

    <div class="code">
      RE-CWR6-K6J4-RYN9-AYD9
    </div>

    <button
      class="copy-btn"
      onclick="copyCode(event)"
    >
      COPY CODE
    </button>

    <p class="roblox-label">
      (for the prettiest girl ♡)
    </p>

  </div>

</div>

<script>

/* ETOILES */

const stars =
document.getElementById("stars");

for(let i = 0; i < 300; i++){

  const star =
  document.createElement("div");

  star.className = "star";

  const size =
  Math.random() * 1.8 + 0.6;

  star.style.width =
  size + "px";

  star.style.height =
  size + "px";

  star.style.left =
  Math.random() * 100 + "%";

  star.style.top =
  Math.random() * 100 + "%";

  star.style.animationDuration =
  (Math.random() * 3 + 1.2) + "s";

  star.style.animationDelay =
  (Math.random() * 5) + "s";

  stars.appendChild(star);
}

let opened = false;

function openHeart(){

  if(opened) return;

  opened = true;

  /* MUSIQUE */

  const music =
  document.getElementById("bgMusic");

  music.volume = 0.50;

  music.play();

  document.getElementById("intro").style.opacity = "0";

  document.getElementById("intro").style.pointerEvents = "none";

  document.getElementById("main").style.opacity = "1";

  setTimeout(() => {

    document.querySelectorAll(".word")
    .forEach((word) => {

      word.style.animationPlayState = "running";

    });

  }, 900);

  setTimeout(() => {

    document.getElementById("giftCode")
    .style.opacity = "1";

  }, 7500);
}

/* COPY CODE */

function copyCode(event){

  event.stopPropagation();

  const code =
  document.querySelector(".code").innerText;

  navigator.clipboard.writeText(code);

  event.target.innerText = "COPIED";
}

const heart =
document.getElementById("heart");

/* CREATE WORD */

function createWord(x, y, size = 13){

  const word =
  document.createElement("div");

  word.className = "word";

  const span =
  document.createElement("span");

  span.innerText = "i love you";

  word.appendChild(span);

  word.style.left = x + "px";

  word.style.top = y + "px";

  word.style.fontSize =
  size + "px";

  const side =
  Math.floor(Math.random() * 4);

  let startX;
  let startY;

  if(side === 0){

    startX = "-900px";

    startY =
    (Math.random() * 650 - 325)
    + "px";
  }

  else if(side === 1){

    startX = "900px";

    startY =
    (Math.random() * 650 - 325)
    + "px";
  }

  else if(side === 2){

    startX =
    (Math.random() * 650 - 325)
    + "px";

    startY = "-800px";
  }

  else{

    startX =
    (Math.random() * 650 - 325)
    + "px";

    startY = "800px";
  }

  word.style.setProperty(
    "--startX",
    startX
  );

  word.style.setProperty(
    "--startY",
    startY
  );

  span.style.setProperty(
    "--moveX1",
    (Math.random() * 18 - 9) + "px"
  );

  span.style.setProperty(
    "--moveY1",
    (Math.random() * 18 - 9) + "px"
  );

  span.style.setProperty(
    "--moveX2",
    (Math.random() * 22 - 11) + "px"
  );

  span.style.setProperty(
    "--moveY2",
    (Math.random() * 22 - 11) + "px"
  );

  span.style.setProperty(
    "--moveX3",
    (Math.random() * 18 - 9) + "px"
  );

  span.style.setProperty(
    "--moveY3",
    (Math.random() * 18 - 9) + "px"
  );

  word.style.animationDelay =
  (Math.random() * 1.8) + "s";

  span.style.animationDelay =
  (Math.random() * 3) + "s";

  heart.appendChild(word);
}

/* HEART OUTLINE */

for(let i = 0; i < 210; i++){

  const t =
  Math.random() * Math.PI * 2;

  const x =
  16 * Math.pow(Math.sin(t), 3);

  const y =
  13 * Math.cos(t)
  - 5 * Math.cos(2*t)
  - 2 * Math.cos(3*t)
  - Math.cos(4*t);

  const scale = 17;

  const finalX =
  410 + x * scale
  + (Math.random() - 0.5) * 16;

  const finalY =
  410 - y * scale
  + (Math.random() - 0.5) * 16;

  createWord(
    finalX,
    finalY,
    10 + Math.random() * 5
  );
}

/* HEART INSIDE */

for(let i = 0; i < 110; i++){

  const t =
  Math.random() * Math.PI * 2;

  const x =
  16 * Math.pow(Math.sin(t), 3);

  const y =
  13 * Math.cos(t)
  - 5 * Math.cos(2*t)
  - 2 * Math.cos(3*t)
  - Math.cos(4*t);

  const scale =
  6 + Math.random() * 9;

  const finalX =
  410 + x * scale
  + (Math.random() - 0.5) * 24;

  const finalY =
  410 - y * scale
  + (Math.random() - 0.5) * 24;

  createWord(
    finalX,
    finalY,
    8 + Math.random() * 4
  );
}

</script>

</body>
</html>
